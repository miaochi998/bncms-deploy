# ============================================================
# BangNiCMS 生产堆栈（PR9）
# 设计文档：docs/deployment/15-module-f-compose.md
# ------------------------------------------------------------
# 服务拓扑（6 个服务）：
#   postgres + redis  数据层
#   server            后端 API（/api/2026-04/*）
#   web + admin       Next.js 前台 / 后台（standalone）
#   caddy             反向代理 + 自动 HTTPS（Let's Encrypt）
#
# 网络拓扑（两个桥接网络，只有 caddy 桥接外网）：
#   bangnicms-internal   server / web / admin / postgres / redis / caddy
#   bangnicms-external   仅 caddy 暴露 80/443
#
# 数据持久化：
#   所有有状态数据 bind mount 到 ${DATA_ROOT:-/opt/bangnicms/data}/*
#   用户搬迁只需要改 DATA_ROOT
#
# 域名路由：
#   https://${DOMAIN}/               → web
#   https://${DOMAIN}/api/*          → server
#   https://admin.${DOMAIN}/         → admin
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${BANGNICMS_POSTGRES_DB:-bangnicms}
      POSTGRES_USER: ${BANGNICMS_POSTGRES_USER:-bangnicms}
      POSTGRES_PASSWORD: ${BANGNICMS_POSTGRES_PASSWORD}
    volumes:
      - ${DATA_ROOT:-/opt/bangnicms/data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BANGNICMS_POSTGRES_USER:-bangnicms}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - bangnicms-internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${DATA_ROOT:-/opt/bangnicms/data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - bangnicms-internal

  server:
    image: ghcr.io/miaochi998/bangnicms-server:${APP_VERSION:-0.2.2}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      BANGNICMS_APP_VERSION: ${APP_VERSION:-0.2.2}
      BANGNICMS_GIT_SHA: ${BANGNICMS_GIT_SHA:-prod}
      BANGNICMS_BUILD_TIME: ${BANGNICMS_BUILD_TIME:-prod}
      BANGNICMS_SERVER_PORT: 6530
      # 内部连接（容器网络 DNS）
      BANGNICMS_DATABASE_URL: postgresql://${BANGNICMS_POSTGRES_USER:-bangnicms}:${BANGNICMS_POSTGRES_PASSWORD}@postgres:5432/${BANGNICMS_POSTGRES_DB:-bangnicms}?schema=public
      BANGNICMS_SHADOW_DATABASE_URL: postgresql://${BANGNICMS_POSTGRES_USER:-bangnicms}:${BANGNICMS_POSTGRES_PASSWORD}@postgres:5432/${BANGNICMS_POSTGRES_DB:-bangnicms}_shadow?schema=public
      BANGNICMS_REDIS_URL: redis://redis:6379
      BANGNICMS_STORAGE_ROOT: /data
      BANGNICMS_API_BASE_PATH: /api
      BANGNICMS_API_VERSION_SEGMENT: ${API_VERSION_SEGMENT:-2026-04}
      # 对外可访问 URL（浏览器可达）
      BANGNICMS_PUBLIC_API_ORIGIN: https://${DOMAIN}
      BANGNICMS_PUBLIC_WEB_ORIGIN: https://${DOMAIN}
      BANGNICMS_PUBLIC_ADMIN_ORIGIN: https://admin.${DOMAIN}
      BANGNICMS_SITE_NAME: ${BANGNICMS_SITE_NAME:-BangNiCMS}
      BANGNICMS_SITE_HOST: ${DOMAIN}
      BANGNICMS_DEFAULT_LANGUAGE_CODE: ${BANGNICMS_DEFAULT_LANGUAGE_CODE:-zh-CN}
      BANGNICMS_URL_STRATEGY: ${BANGNICMS_URL_STRATEGY:-locale-prefix}
      BANGNICMS_JWT_SECRET: ${BANGNICMS_JWT_SECRET}
      BANGNICMS_REVALIDATE_SECRET: ${BANGNICMS_REVALIDATE_SECRET:-change-me}
      # 备份：pg_dump / pg_restore（镜像内置 postgresql17-client，走默认 PATH）
      BANGNICMS_PG_DUMP_BIN: pg_dump
      BANGNICMS_PG_RESTORE_BIN: pg_restore
      # Portainer 集成（模块 C 在线升级）
      PORTAINER_URL: ${PORTAINER_URL:-}
      PORTAINER_API_KEY: ${PORTAINER_API_KEY:-}
      PORTAINER_STACK_ID: ${PORTAINER_STACK_ID:-}
      PORTAINER_ENDPOINT_ID: ${PORTAINER_ENDPOINT_ID:-}
    volumes:
      - ${DATA_ROOT:-/opt/bangnicms/data}/storage:/data
    networks:
      - bangnicms-internal

  web:
    image: ghcr.io/miaochi998/bangnicms-web:${APP_VERSION:-0.2.2}
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NODE_ENV: production
      BANGNICMS_APP_VERSION: ${APP_VERSION:-0.2.2}
      BANGNICMS_GIT_SHA: ${BANGNICMS_GIT_SHA:-prod}
      BANGNICMS_BUILD_TIME: ${BANGNICMS_BUILD_TIME:-prod}
      BANGNICMS_API_BASE_PATH: /api
      BANGNICMS_API_VERSION_SEGMENT: ${API_VERSION_SEGMENT:-2026-04}
      BANGNICMS_PUBLIC_API_ORIGIN: https://${DOMAIN}
      BANGNICMS_PUBLIC_WEB_ORIGIN: https://${DOMAIN}
      BANGNICMS_PUBLIC_ADMIN_ORIGIN: https://admin.${DOMAIN}
      BANGNICMS_DEFAULT_LANGUAGE_CODE: ${BANGNICMS_DEFAULT_LANGUAGE_CODE:-zh-CN}
      BANGNICMS_URL_STRATEGY: ${BANGNICMS_URL_STRATEGY:-locale-prefix}
      BANGNICMS_SITE_NAME: ${BANGNICMS_SITE_NAME:-BangNiCMS}
      BANGNICMS_SITE_HOST: ${DOMAIN}
      BANGNICMS_REVALIDATE_SECRET: ${BANGNICMS_REVALIDATE_SECRET:-change-me}
      NEXT_PUBLIC_BANGNICMS_API_ORIGIN: https://${DOMAIN}
      NEXT_PUBLIC_BANGNICMS_API_BASE_PATH: /api
      NEXT_PUBLIC_BANGNICMS_API_VERSION_SEGMENT: ${API_VERSION_SEGMENT:-2026-04}
    networks:
      - bangnicms-internal

  admin:
    image: ghcr.io/miaochi998/bangnicms-admin:${APP_VERSION:-0.2.2}
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NODE_ENV: production
      BANGNICMS_APP_VERSION: ${APP_VERSION:-0.2.2}
      BANGNICMS_GIT_SHA: ${BANGNICMS_GIT_SHA:-prod}
      BANGNICMS_BUILD_TIME: ${BANGNICMS_BUILD_TIME:-prod}
      BANGNICMS_API_BASE_PATH: /api
      BANGNICMS_API_VERSION_SEGMENT: ${API_VERSION_SEGMENT:-2026-04}
      BANGNICMS_PUBLIC_API_ORIGIN: https://${DOMAIN}
      BANGNICMS_PUBLIC_WEB_ORIGIN: https://${DOMAIN}
      BANGNICMS_PUBLIC_ADMIN_ORIGIN: https://admin.${DOMAIN}
      BANGNICMS_DEFAULT_LANGUAGE_CODE: ${BANGNICMS_DEFAULT_LANGUAGE_CODE:-zh-CN}
      BANGNICMS_URL_STRATEGY: ${BANGNICMS_URL_STRATEGY:-locale-prefix}
      BANGNICMS_SITE_NAME: ${BANGNICMS_SITE_NAME:-BangNiCMS}
      BANGNICMS_SITE_HOST: ${DOMAIN}
      NEXT_PUBLIC_BANGNICMS_API_ORIGIN: https://${DOMAIN}
      NEXT_PUBLIC_BANGNICMS_API_BASE_PATH: /api
      NEXT_PUBLIC_BANGNICMS_API_VERSION_SEGMENT: ${API_VERSION_SEGMENT:-2026-04}
    networks:
      - bangnicms-internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - server
      - web
      - admin
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    environment:
      DOMAIN: ${DOMAIN}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${DATA_ROOT:-/opt/bangnicms/data}/caddy/data:/data
      - ${DATA_ROOT:-/opt/bangnicms/data}/caddy/config:/config
      - ${DATA_ROOT:-/opt/bangnicms/data}/caddy/logs:/var/log/caddy
    networks:
      - bangnicms-internal
      - bangnicms-external

networks:
  bangnicms-internal:
    driver: bridge
    internal: false
  bangnicms-external:
    driver: bridge
